<g font-family="ui-monospace,Consolas,monospace" text-anchor="middle">
  <g transform="translate(70 474)"><rect width="132" height="104" rx="14" fill="#090a0f" stroke="#6b5c91" stroke-width="2"/><text x="66" y="50" fill="#b49fe9" font-size="33">&lt;&gt;</text><text x="66" y="86" fill="#aeb2bc" font-size="17">SCHEMA</text></g>
  <g transform="translate(244 474)"><rect width="132" height="104" rx="14" fill="#090a0f" stroke="#6b5c91" stroke-width="2"/><text x="66" y="50" fill="#b49fe9" font-size="35">≡</text><text x="66" y="86" fill="#aeb2bc" font-size="17">STATE</text></g>
  <g transform="translate(418 474)"><rect width="132" height="104" rx="14" fill="#090a0f" stroke="#6b5c91" stroke-width="2"/><text x="66" y="50" fill="#b49fe9" font-size="35">✓</text><text x="66" y="86" fill="#aeb2bc" font-size="17">AUDIT</text></g>
  <g transform="translate(592 474)"><rect width="132" height="104" rx="14" fill="#090a0f" stroke="#6b5c91" stroke-width="2"/><text x="66" y="50" fill="#b49fe9" font-size="35">⇄</text><text x="66" y="86" fill="#aeb2bc" font-size="17">EXCHANGE</text></g>
</g>

