<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="768" viewBox="0 0 2048 768" role="img" aria-labelledby="title desc">
<title id="title">AZ-05 Azazel-Fabric — Shared Contracts and Interoperability Foundation</title>
<desc id="desc">Graphite and protocol-violet Azazel banner using the same forward-facing circuit-goat family silhouette as the Edge and Knowledge banners. Fabric-specific contract traces connect independent product nodes without implying central command.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#050608"/><stop offset="0.55" stop-color="#090a10"/><stop offset="1" stop-color="#151720"/></linearGradient>
  <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4a3a86"/><stop offset="0.5" stop-color="#6e58b8"/><stop offset="1" stop-color="#9a86dd"/></linearGradient>
  <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse"><path d="M64 0H0V64" fill="none" stroke="#d9dbe2" stroke-opacity=".03"/></pattern>
</defs>
<rect width="2048" height="768" fill="url(#bg)"/><rect width="2048" height="768" fill="url(#grid)"/><rect x="18" y="18" width="2012" height="732" rx="18" fill="none" stroke="#51486d" stroke-width="2"/>

<!-- Identity zone -->
<g font-family="Arial,Helvetica,sans-serif">
  <rect x="54" y="48" width="206" height="64" rx="12" fill="#090a0f" stroke="#6e58b8" stroke-width="2"/>
  <text x="83" y="91" fill="#bba9ef" font-family="ui-monospace,Consolas,monospace" font-size="34" letter-spacing="3">AZ-05</text>
  <text x="54" y="199" fill="#f1f2f5" font-size="72" font-weight="800" letter-spacing="1">AZAZEL-FABRIC</text>
  <text x="58" y="247" fill="#aeb2bc" font-size="28">Shared Contracts and Interoperability Foundation</text>
  <text x="58" y="292" fill="#b39de8" font-family="ui-monospace,Consolas,monospace" font-size="23">CODENAME: COVENANT</text>
  <line x1="58" y1="322" x2="677" y2="322" stroke="#5f4e9f" stroke-width="2"/>
  <text x="58" y="379" fill="#eceef2" font-size="39" font-weight="700">SHARED CONTRACTS.</text>
  <text x="58" y="427" fill="#eceef2" font-size="39" font-weight="700">LOCAL AUTHORITY.</text>
</g>

<!-- Four peer contract domains -->
<g font-family="ui-monospace,Consolas,monospace" text-anchor="middle">
  <g transform="translate(70 474)"><rect width="132" height="104" rx="14" fill="#090a0f" stroke="#6b5c91" stroke-width="2"/><text x="66" y="50" fill="#b49fe9" font-size="33">&lt;&gt;</text><text x="66" y="86" fill="#aeb2bc" font-size="17">SCHEMA</text></g>
  <g transform="translate(244 474)"><rect width="132" height="104" rx="14" fill="#090a0f" stroke="#6b5c91" stroke-width="2"/><text x="66" y="50" fill="#b49fe9" font-size="35">≡</text><text x="66" y="86" fill="#aeb2bc" font-size="17">STATE</text></g>
  <g transform="translate(418 474)"><rect width="132" height="104" rx="14" fill="#090a0f" stroke="#6b5c91" stroke-width="2"/><text x="66" y="50" fill="#b49fe9" font-size="35">✓</text><text x="66" y="86" fill="#aeb2bc" font-size="17">AUDIT</text></g>
  <g transform="translate(592 474)"><rect width="132" height="104" rx="14" fill="#090a0f" stroke="#6b5c91" stroke-width="2"/><text x="66" y="50" fill="#b49fe9" font-size="35">⇄</text><text x="66" y="86" fill="#aeb2bc" font-size="17">EXCHANGE</text></g>
</g>

