  <path d="M720 310C900 260 1040 260 1230 310S1420 330 1588 310" stroke="#6e58b8" stroke-width="2" opacity=".62"/>
  <path d="M720 335C900 300 1040 295 1230 335S1420 355 1588 335" stroke="#8b73cf" stroke-width="2" opacity=".72"/>
  <path d="M720 420C900 360 1040 365 1230 420S1420 440 1588 420" stroke="#59478f" stroke-width="2" opacity=".55"/>
  <path d="M720 445C900 405 1040 400 1230 445S1420 465 1588 445" stroke="#6e58b8" stroke-width="2" opacity=".62"/>
  <path d="M720 470C900 440 1040 435 1230 470S1420 490 1588 470" stroke="#8b73cf" stroke-width="2" opacity=".72"/>
</g>

<!-- brand zone: recognizable goat silhouette built from contract traces -->
<g transform="translate(1000 348)">
  <circle r="252" fill="#08090d" fill-opacity=".45" stroke="#4f4472" stroke-width="2"/>
  <circle r="224" fill="none" stroke="#6e58b8" stroke-opacity=".4" stroke-width="2"/>
  <path d="M-64-125C-165-190-208-61-119 23M64-125C165-190 208-61 119 23" fill="none" stroke="url(#violet)" stroke-width="24" stroke-linecap="round"/>
  <path d="M-82-44L-146-12-104 25-61 10M82-44L146-12 104 25 61 10" fill="none" stroke="#9279d8" stroke-width="14" stroke-linejoin="round"/>
  <path d="M0-126L84-55 57 108 0 154-57 108-84-55Z" fill="#0b0c12" stroke="url(#violet)" stroke-width="7"/>
  <path d="M0-118V118M-54-70L-20-36V64L-53 88M54-70L20-36V64L53 88M-38 6L0 36 38 6M0 36V112" fill="none" stroke="#9a86dd" stroke-width="9" stroke-linecap="round"/>
  <circle cx="-54" cy="-34" r="7" fill="#b6a3ef"/><circle cx="54" cy="-34" r="7" fill="#b6a3ef"/><circle cx="0" cy="36" r="6" fill="#b6a3ef"/>
  <path d="M-40 123L0 166 40 123" fill="none" stroke="#7b67bf" stroke-width="8"/>
</g>

<!-- semantic statement -->
<g font-family="ui-monospace,Consolas,monospace" text-anchor="middle">
  <rect x="790" y="592" width="420" height="72" rx="12" fill="#090a0f" stroke="#6e58b8" stroke-width="2"/>
  <text x="1000" y="623" fill="#b49fe9" font-size="24" letter-spacing="1">ONE SET OF CONTRACTS</text>
  <text x="1000" y="650" fill="#9ea3ad" font-size="14" letter-spacing="1.5">MANY INDEPENDENT PRODUCTS</text>
</g>

<!-- independent products, same repeated contract token -->
<g font-family="Arial,Helvetica,sans-serif">
  <g transform="translate(1588 106)"><rect width="400" height="100" rx="14" fill="#090a0f" stroke="#595666" stroke-width="2"/><rect x="18" y="16" width="70" height="68" rx="10" fill="none" stroke="#6e58b8" stroke-width="2"/><path d="M34 50H72M53 31V69" stroke="#b49fe9" stroke-width="3"/><text x="116" y="45" fill="#eceef2" font-size="25">EDGE</text><text x="116" y="72" fill="#9ea3ad" font-family="ui-monospace,Consolas,monospace" font-size="13">SAME CONTRACT STRUCTURE</text></g>
  <g transform="translate(1588 246)"><rect width="400" height="100" rx="14" fill="#090a0f" stroke="#595666" stroke-width="2"/><rect x="18" y="16" width="70" height="68" rx="10" fill="none" stroke="#6e58b8" stroke-width="2"/><path d="M34 50H72M53 31V69" stroke="#b49fe9" stroke-width="3"/><text x="116" y="45" fill="#eceef2" font-size="25">GADGET</text><text x="116" y="72" fill="#9ea3ad" font-family="ui-monospace,Consolas,monospace" font-size="13">SAME CONTRACT STRUCTURE</text></g>
  <g transform="translate(1588 386)"><rect width="400" height="100" rx="14" fill="#090a0f" stroke="#595666" stroke-width="2"/><rect x="18" y="16" width="70" height="68" rx="10" fill="none" stroke="#6e58b8" stroke-width="2"/><path d="M34 50H72M53 31V69" stroke="#b49fe9" stroke-width="3"/><text x="116" y="45" fill="#eceef2" font-size="25">KNOWLEDGE</text><text x="116" y="72" fill="#9ea3ad" font-family="ui-monospace,Consolas,monospace" font-size="13">SAME CONTRACT STRUCTURE</text></g>
  <g transform="translate(1588 526)"><rect width="400" height="100" rx="14" fill="#090a0f" stroke="#595666" stroke-width="2"/><rect x="18" y="16" width="70" height="68" rx="10" fill="none" stroke="#6e58b8" stroke-width="2"/><path d="M34 50H72M53 31V69" stroke="#b49fe9" stroke-width="3"/><text x="116" y="45" fill="#eceef2" font-size="25">FUTURE NODES</text><text x="116" y="72" fill="#9ea3ad" font-family="ui-monospace,Consolas,monospace" font-size="13">SAME CONTRACT STRUCTURE</text></g>
</g>

<!-- footer: three characteristics only -->
<g font-family="ui-monospace,Consolas,monospace" fill="#eceef2" font-size="20" letter-spacing="1.2">
  <rect x="42" y="688" width="1964" height="48" rx="13" fill="#090a0f" stroke="#4f4960" stroke-width="2"/>
  <text x="90" y="720">INTEROPERABLE BY DESIGN</text><line x1="650" y1="698" x2="650" y2="727" stroke="#5b5272" stroke-width="2"/>
  <text x="715" y="720">CONSISTENT STATE MODEL</text><line x1="1354" y1="698" x2="1354" y2="727" stroke="#5b5272" stroke-width="2"/>
  <text x="1415" y="720">FAIL-CLOSED BY DEFAULT</text>
