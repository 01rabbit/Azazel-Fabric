name: Release

# Tag-driven version management. Pushing a `vX.Y.Z` tag validates that the tag
# matches the packaged version, runs the test suite, and cuts a GitHub Release.
# This keeps the source of truth (src/azazel_common/version.py) and the GitHub
# Release in lockstep — see docs/migration-plan.md "Versioning and consumption
# policy".

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c 'import azazel_common; print(azazel_common.__version__)')"
          echo "tag=$tag package=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match package version $pkg"
            exit 1
          fi
      - name: Run tests
        run: pytest -q
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
